<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>Học phần của tôi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">Hệ thống đăng ký học phần</a>

        <div class="ms-auto d-flex align-items-center gap-2">
            <span class="text-white" sec:authorize="isAuthenticated()">
                Xin chào, <strong sec:authentication="name"></strong>
            </span>
            <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
                <button class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="page-title mb-0">Các học phần đã đăng ký</h2>
        <a th:href="@{/home}" class="btn btn-secondary">Về trang chủ</a>
    </div>

    <div th:if="${enrollments.isEmpty()}" class="alert alert-warning">
        Bạn chưa đăng ký học phần nào.
    </div>

    <div class="table-responsive" th:if="${!enrollments.isEmpty()}">
        <table class="table table-bordered table-hover align-middle bg-white">
            <thead class="table-dark">
            <tr>
                <th>Tên học phần</th>
                <th>Số tín chỉ</th>
                <th>Giảng viên</th>
                <th>Ngày đăng ký</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="enrollment : ${enrollments}">
                <td th:text="${enrollment.course.name}"></td>
                <td th:text="${enrollment.course.credits}"></td>
                <td th:text="${enrollment.course.lecturer}"></td>
                <td th:text="${#temporals.format(enrollment.enrollDate, 'dd/MM/yyyy HH:mm')}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
