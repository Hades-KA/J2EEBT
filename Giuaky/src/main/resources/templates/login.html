<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-5">
            <div class="card auth-card shadow">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">Đăng nhập</h2>

                    <div th:if="${param.error}" class="alert alert-danger">
                        Sai tên đăng nhập hoặc mật khẩu.
                    </div>

                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Tên đăng nhập</label>
                            <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mật khẩu</label>
                            <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu">
                        </div>

                        <button class="btn btn-primary w-100">Đăng nhập</button>
                    </form>

                    <div class="text-center my-3 text-muted">hoặc</div>
                    <a href="/oauth2/authorization/google" class="btn btn-danger w-100">
                        Đăng nhập bằng Google
                    </a>
                   

                    <div class="mt-4 text-center">
                        <a th:href="@{/register}">Chưa có tài khoản? Đăng ký</a>
                    </div>

                    <div class="mt-2 text-center">
                        <a th:href="@{/home}">← Về trang chủ</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
