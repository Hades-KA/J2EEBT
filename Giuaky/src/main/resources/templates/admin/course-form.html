<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Biểu mẫu học phần</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-4">
    <div class="col-lg-8 mx-auto">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="mb-4" th:text="${course.id == null ? 'Thêm học phần' : 'Cập nhật học phần'}"></h2>

                <form th:action="@{/admin/courses/save}"
                      th:object="${course}"
                      method="post"
                      enctype="multipart/form-data">

                    <input type="hidden" th:field="*{id}">
                    <!-- giữ ảnh cũ nếu không chọn file mới -->
                    <input type="hidden" th:field="*{image}">

                    <div class="mb-3">
                        <label class="form-label">Tên học phần</label>
                        <input type="text" th:field="*{name}" class="form-control">
                        <div class="text-danger small mt-1" th:errors="*{name}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Ảnh minh họa (tải từ máy)</label>
                        <input type="file" name="imageFile" class="form-control" accept="image/*">
                        <div class="form-text">
                            Nếu không chọn ảnh mới, hệ thống sẽ giữ ảnh hiện tại.
                        </div>
                    </div>

                    <div class="mb-3" th:if="${!#strings.isEmpty(course.image)}">
                        <label class="form-label">Ảnh hiện tại</label><br>
                        <img th:src="${course.image}" alt="Ảnh học phần"
                             style="max-width: 240px; border-radius: 10px;">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Số tín chỉ</label>
                        <input type="number" th:field="*{credits}" class="form-control">
                        <div class="text-danger small mt-1" th:errors="*{credits}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Giảng viên</label>
                        <input type="text" th:field="*{lecturer}" class="form-control">
                        <div class="text-danger small mt-1" th:errors="*{lecturer}"></div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Danh mục</label>
                        <select name="categoryId" class="form-select">
                            <option value="">-- Chọn danh mục --</option>
                            <option th:each="category : ${categories}"
                                    th:value="${category.id}"
                                    th:text="${category.name}"
                                    th:selected="${course.category != null and category.id == course.category.id}">
                            </option>
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button class="btn btn-success">Lưu</button>
                        <a th:href="@{/admin/courses}" class="btn btn-secondary">Quay lại</a>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

</body>
</html>
