<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>Quản trị - Quản lý học phần</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">Hệ thống đăng ký học phần</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/home}" class="btn btn-outline-light btn-sm">Trang chủ</a>
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <h2 class="page-title mb-0">Quản lý học phần</h2>
        <a th:href="@{/admin/courses/create}" class="btn btn-primary">+ Thêm học phần</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="table-responsive">
        <table class="table table-bordered table-hover align-middle bg-white">
            <thead class="table-dark">
            <tr>
                <th>Mã</th>
                <th>Tên học phần</th>
                <th>Tín chỉ</th>
                <th>Giảng viên</th>
                <th>Hình ảnh</th>
                <th>Danh mục</th>
                <th width="170">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="course : ${courses}">
                <td th:text="${course.id}"></td>
                <td th:text="${course.name}"></td>
                <td th:text="${course.credits}"></td>
                <td th:text="${course.lecturer}"></td>
                <td>
                    <img th:src="${#strings.isEmpty(course.image) ? 'https://picsum.photos/seed/default/200/120' : course.image}"
                         alt="Ảnh" width="100" height="60">
                </td>
                <td th:text="${course.category != null ? course.category.name : ''}"></td>
                <td>
                    <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}" class="btn btn-warning btn-sm">Sửa</a>
                    <form th:action="@{/admin/courses/delete/{id}(id=${course.id})}" method="post" class="d-inline">
                        <button class="btn btn-danger btn-sm" onclick="return confirm('Bạn có chắc muốn xóa?')">
                            Xóa
                        </button>
                    </form>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(courses)}">
                <td colspan="7" class="text-center">Chưa có học phần nào.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
