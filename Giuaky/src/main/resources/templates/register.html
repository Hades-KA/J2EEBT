<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card auth-card shadow">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">Đăng ký tài khoản sinh viên</h2>

                    <form th:action="@{/register}" th:object="${registerRequest}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Tên đăng nhập</label>
                            <input type="text" th:field="*{username}" class="form-control" placeholder="Nhập tên đăng nhập">
                            <div class="text-danger small mt-1" th:errors="*{username}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mật khẩu</label>
                            <input type="password" th:field="*{password}" class="form-control" placeholder="Nhập mật khẩu">
                            <div class="text-danger small mt-1" th:errors="*{password}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" placeholder="Nhập email">
                            <div class="text-danger small mt-1" th:errors="*{email}"></div>
                        </div>

                        <div class="alert alert-danger py-2"
                             th:if="${#fields.hasGlobalErrors()}"
                             th:each="err : ${#fields.globalErrors()}"
                             th:text="${err}">
                        </div>

                        <button class="btn btn-success w-100">Đăng ký</button>
                    </form>

                    <div class="mt-4 text-center">
                        <a th:href="@{/login}">Đã có tài khoản? Đăng nhập</a>
                    </div>

                    <div class="mt-2 text-center">
                        <a th:href="@{/home}">← Về trang chủ</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
